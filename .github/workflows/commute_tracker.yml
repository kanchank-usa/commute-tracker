name: Commute Tracker

on:
  schedule:
    # Morning window: 6–10 AM Pacific (covers both PST=UTC-8 and PDT=UTC-7)
    - cron: '*/10 13-17 * * 2-4'
    # Evening window pt1: 3–7 PM Pacific, before midnight UTC (Tue–Thu)
    - cron: '*/10 22-23 * * 2-4'
    # Evening window pt2: 3–7 PM Pacific, after midnight UTC (Wed–Fri)
    - cron: '*/10 0-2 * * 3-5'
  workflow_dispatch: # Allow manual runs for testing

concurrency:
  group: commute-tracker
  cancel-in-progress: false # Never cancel a run mid-log; queue instead

permissions:
  contents: write

jobs:
  log-commute:
    runs-on: ubuntu-latest
    env:
      TZ: America/Los_Angeles
      GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
      HOME_ADDRESS: ${{ secrets.HOME_ADDRESS }}
      WORK_ADDRESS: ${{ secrets.WORK_ADDRESS }}
      CSV_PATH: output/commute_times.csv

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run commute logger
        run: python commute_logger.py

      - name: Commit CSV if updated
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/commute_times.csv
          if git diff --cached --quiet; then
            echo "No new data to commit (outside tracked window)"
          else
            git commit -m "data: log commute $(date +'%Y-%m-%d %H:%M %Z')"
            git push
          fi
