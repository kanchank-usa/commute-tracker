name: Commute Tracker

on:
  schedule:
    # Morning: 6:00 AM PDT (13:00 UTC) Tue–Thu — triggers 4-hr loop
    - cron: '0 13 * * 2-4'
    # Evening: 3:00 PM PDT (22:00 UTC) Tue–Thu — triggers 4-hr loop
    - cron: '0 22 * * 2-4'
  workflow_dispatch: # Allow manual runs for testing

concurrency:
  group: commute-tracker
  cancel-in-progress: false # Never cancel a run mid-log; queue instead

permissions:
  contents: write

jobs:
  log-commute:
    runs-on: ubuntu-latest
    env:
      TZ: America/Los_Angeles
      GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
      HOME_ADDRESS: ${{ secrets.HOME_ADDRESS }}
      WORK_ADDRESS: ${{ secrets.WORK_ADDRESS }}
      CSV_PATH: output/commute_times.csv

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run commute logger loop
        run: |
          # TEST: 7 iterations (~1 hr). After test, restore to 24 for 4-hr window.
          for i in $(seq 1 7); do
            python commute_logger.py
            [ $i -lt 7 ] && sleep 600
          done

      - name: Commit CSV if updated
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/commute_times.csv
          if git diff --cached --quiet; then
            echo "No new data to commit (outside tracked window)"
          else
            git commit -m "data: log commute $(date +'%Y-%m-%d %H:%M %Z')"
            git push
          fi
